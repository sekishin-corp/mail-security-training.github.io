  <body class="bg-warning">
    <div class="container text-center d-flex flex-column align-items-center justify-center py-5">
      <h3>積進 情報セキュリティ訓練</h3>
      
      <div>
        <img src="https://free-icons.net/wp-content/uploads/svg/pcsp048.svg" width="200px" height="200px">
      </div>
      
      <h2 class="mt-3">本メールは標的型攻撃<b class="text-danger">「訓練」</b>メールです。</h2>
      
      <p style="max-width: 600px;" class="mt-3 text-start">
        本メールによるウィルス感染等の影響はございません。
        <br>
        本メールは訓練ですが、本番と同様に<b>上長および設計課まで報告</b>をお願いいたします。
      </p>
      
      <p class="mt-3">
        セキュリティ事故を未然に防ぐためのコンテンツをご用意しましたので、ご確認ください。
      </p>
      
      <ul class="text-start">
        <li>
          <a href="https://drive.google.com/file/d/1vEN6pkzYMucUb-1qvSaojum0-RDawNRk/view?usp=sharing" target="_blank">標的型攻撃メールについて</a>
        </li>
        <li>
          <a href="https://www.ipa.go.jp/security/10threats/eid2eo0000005231-att/setsumei_2025_soshiki.pdf" target="_blank">情報セキュリティ10大脅威 2025[組織編]</a>
        </li>
        <li>
          <a href="https://www.ipa.go.jp/security/10threats/eid2eo0000005231-att/setsumei_2025_kojin.pdf" target="_blank">情報セキュリティ10大脅威 2025[個人編] ハンドブック</a>
        </li>
      </ul>
      
      <p class="mt-3">
        <b>株式会社積進 CSIRT(セキュリティ事故対応チーム)</b>
      </p>
